AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ReceiptPulse serverless receipt intelligence platform

Parameters:
  SesSenderEmail:
    Type: String
    Description: Verified SES sender identity used for outgoing receipt notifications.
  SesDefaultRecipientEmail:
    Type: String
    Description: Fallback recipient when uploader metadata does not contain an email.
  ConfidenceThreshold:
    Type: Number
    Default: 85
    Description: Minimum extraction confidence before a receipt is routed to manual review.
  SnapshotCacheTtlSeconds:
    Type: Number
    Default: 45
    Description: Warm cache TTL for dashboard snapshot responses.
  SendEmailNotifications:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable SES notification delivery after receipt processing.
  ReadObjectMetadata:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Read uploader metadata from the uploaded S3 object before processing.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref ReceiptTable
        SES_SENDER_EMAIL: !Ref SesSenderEmail
        SES_RECIPIENT_EMAIL: !Ref SesDefaultRecipientEmail
        CONFIDENCE_THRESHOLD: !Ref ConfidenceThreshold
        SNAPSHOT_CACHE_TTL_SECONDS: !Ref SnapshotCacheTtlSeconds
        SEND_EMAIL_NOTIFICATIONS: !Ref SendEmailNotifications
        READ_OBJECT_METADATA: !Ref ReadObjectMetadata

Resources:
  ReceiptBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  ReceiptDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: receiptpulse-dlq

  ReceiptTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: receipt_id
          AttributeType: S
        - AttributeName: duplicate_key
          AttributeType: S
        - AttributeName: expense_month
          AttributeType: S
      KeySchema:
        - AttributeName: receipt_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DuplicateKeyIndex
          KeySchema:
            - AttributeName: duplicate_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ExpenseMonthIndex
          KeySchema:
            - AttributeName: expense_month
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ReceiptProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: lambda_function.lambda_handler
      Events:
        ReceiptUpload:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref ReceiptBucket
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ReceiptDeadLetterQueue.Arn
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ReceiptBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptTable
        - Statement:
            - Effect: Allow
              Action:
                - textract:AnalyzeExpense
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

  ReceiptApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - GET
          - PATCH
          - OPTIONS
        AllowOrigins:
          - "*"

  DashboardApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: dashboard_api.lambda_handler
      Events:
        RootRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /health
        ReceiptsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /receipts
        SnapshotRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /snapshot
        AnalyticsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /analytics
        ExportRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /exports/csv
        ReviewRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: PATCH
            Path: /receipts/{receiptId}/review
        WarmSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Input: '{"warmer": true}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptTable

Outputs:
  ReceiptBucketName:
    Value: !Ref ReceiptBucket
  ReceiptTableName:
    Value: !Ref ReceiptTable
  ReceiptApiUrl:
    Value: !Sub "https://${ReceiptApi}.execute-api.${AWS::Region}.amazonaws.com"
  DashboardApiHealthUrl:
    Value: !Sub "https://${ReceiptApi}.execute-api.${AWS::Region}.amazonaws.com/health"
