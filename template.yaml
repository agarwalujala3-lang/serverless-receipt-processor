AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ReceiptPulse serverless receipt intelligence platform

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref ReceiptTable
        SES_SENDER_EMAIL: your-verified-sender@example.com
        SES_RECIPIENT_EMAIL: finance@example.com
        CONFIDENCE_THRESHOLD: "85"

Resources:
  ReceiptBucket:
    Type: AWS::S3::Bucket

  ReceiptDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: receiptpulse-dlq

  ReceiptTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: receipt_id
          AttributeType: S
        - AttributeName: duplicate_key
          AttributeType: S
        - AttributeName: expense_month
          AttributeType: S
      KeySchema:
        - AttributeName: receipt_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DuplicateKeyIndex
          KeySchema:
            - AttributeName: duplicate_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ExpenseMonthIndex
          KeySchema:
            - AttributeName: expense_month
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ReceiptProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: lambda_function.lambda_handler
      Events:
        ReceiptUpload:
          Type: S3
          Properties:
            Bucket: !Ref ReceiptBucket
            Events: s3:ObjectCreated:*
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ReceiptDeadLetterQueue.Arn
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ReceiptBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptTable
        - Statement:
            - Effect: Allow
              Action:
                - textract:AnalyzeExpense
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

  ReceiptApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - GET
          - PATCH
          - OPTIONS
        AllowOrigins:
          - "*"

  DashboardApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: dashboard_api.lambda_handler
      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /health
        ReceiptsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /receipts
        AnalyticsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /analytics
        ExportRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: GET
            Path: /exports/csv
        ReviewRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref ReceiptApi
            Method: PATCH
            Path: /receipts/{receiptId}/review
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptTable

Outputs:
  ReceiptBucketName:
    Value: !Ref ReceiptBucket
  ReceiptTableName:
    Value: !Ref ReceiptTable
  ReceiptApiUrl:
    Value: !Sub "https://${ReceiptApi}.execute-api.${AWS::Region}.amazonaws.com"
